name: Publish to PyPI

# Triggered when Publish Checks completes (not by tag push, because tags
# created with the default GITHUB_TOKEN do not trigger other workflows).
on:
  workflow_run:
    workflows: ["Publish Checks"]
    types: [completed]

jobs:
  # ──────────────────────────────────────────────
  # Job 1 · Download artifacts & Publish
  # ──────────────────────────────────────────────
  publish:
    name: Publish
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    permissions:
      id-token: write  # required for trusted publishing (OIDC)

    steps:
      # Download the dist/ artifacts already built by Publish Checks.
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: List artifacts
        run: ls -lh dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
